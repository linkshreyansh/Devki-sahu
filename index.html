<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book an Appointment - Devki Sahu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #FFF0F5, #FFE4E1);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 48px;
            color: #B43E8F;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 20px;
            color: #666;
        }
        .booking-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: #B43E8F;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #FFE4E1;
            border-radius: 10px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #FF6F61;
            box-shadow: 0 0 0 3px rgba(255,111,97,0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #B43E8F, #FF6F61);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(180,62,143,0.3);
        }
        .back-home {
            text-align: center;
            margin-top: 30px;
        }
        .back-home a {
            color: #B43E8F;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid #B43E8F;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .back-home a:hover {
            background: #B43E8F;
            color: white;
        }
        .confirmation {
            display: none;
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 30px;
            margin-top: 20px;
        }
        .confirmation.show {
            display: block;
        }
        .confirmation h2 {
            color: #B43E8F;
            margin-bottom: 20px;
        }
        .confirmation p {
            font-size: 18px;
            margin-bottom: 15px;
        }
        .booking-form {
            display: block;
        }
        .booking-form.hide {
            display: none;
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 36px;
            }
            .booking-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Book an Appointment</h1>
            <p>Schedule a session with Devki Sahu</p>
        </div>

        <!-- Booking Form -->
        <div id="bookingForm" class="booking-form">
            <div class="booking-card">
                <form id="appointmentForm">
                    <div class="form-group">
                        <label>👤 Full Name</label>
                        <input type="text" id="name" required placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label>📧 Your Email</label>
                        <input type="email" id="email" required placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label>📱 Phone Number</label>
                        <input type="tel" id="phone" required placeholder="Enter your phone number">
                    </div>

                    <div class="form-group">
                        <label>📅 Select Date</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label>⏰ Select Time</label>
                        <select id="time" required>
                            <option value="">Select a time</option>
                            <option value="10:00 AM">10:00 AM</option>
                            <option value="11:00 AM">11:00 AM</option>
                            <option value="12:00 PM">12:00 PM</option>
                            <option value="2:00 PM">2:00 PM</option>
                            <option value="3:00 PM">3:00 PM</option>
                            <option value="4:00 PM">4:00 PM</option>
                            <option value="5:00 PM">5:00 PM</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>👧 Child's Name (if applicable)</label>
                        <input type="text" id="childName" placeholder="Enter child's name">
                    </div>

                    <div class="form-group">
                        <label>📝 Additional Notes</label>
                        <textarea id="notes" placeholder="Any specific topics or questions you'd like to discuss?"></textarea>
                    </div>

                    <button type="submit" class="submit-btn">📧 Send Appointment Request</button>
                </form>
            </div>
            <div class="back-home">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>

        <!-- Confirmation Message -->
        <div id="confirmation" class="confirmation">
            <div class="booking-card">
                <h2>📧 Request Ready!</h2>
                <p>Your email client will now open with all the appointment details pre-filled.</p>
                <p><strong>Just click Send to confirm your appointment with Devki Sahu!</strong></p>
                <p style="margin-top: 20px; color: #B43E8F;">📧 sahu.devki@gmail.com</p>
                <button onclick="bookAnother()" class="submit-btn" style="margin-top: 20px;">📅 Book Another Appointment</button>
                <div style="margin-top: 20px;">
                    <a href="index.html" style="color: #B43E8F; text-decoration: none;">← Return to Homepage</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').min = today;

        // Handle form submission
        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get all form values
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const childName = document.getElementById('childName').value;
            const notes = document.getElementById('notes').value;
            
            // Format the date nicely
            const formattedDate = new Date(date).toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            
            // Create email subject
            const subject = `Appointment Request from ${name}`;
            
            // Create email body with all details
            let body = `New Appointment Request!\n\n`;
            body += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
            body += `👤 Student/Parent Name: ${name}\n`;
            body += `📧 Email: ${email}\n`;
            body += `📱 Phone: ${phone}\n`;
            body += `📅 Date: ${formattedDate}\n`;
            body += `⏰ Time: ${time}\n`;
            
            if (childName) {
                body += `👧 Child's Name: ${childName}\n`;
            }
            
            if (notes) {
                body += `\n📝 Notes:\n${notes}\n`;
            }
            
            body += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            body += `Please confirm this appointment.`;
            
            // Encode for URL
            const encodedSubject = encodeURIComponent(subject);
            const encodedBody = encodeURIComponent(body);
            
            // Open email client
            window.location.href = `mailto:sahu.devki@gmail.com?subject=${encodedSubject}&body=${encodedBody}`;
            
            // Show confirmation message
            document.getElementById('bookingForm').classList.add('hide');
            document.getElementById('confirmation').classList.add('show');
        });
        
        function bookAnother() {
            document.getElementById('bookingForm').classList.remove('hide');
            document.getElementById('confirmation').classList.remove('show');
            document.getElementById('appointmentForm').reset();
        }
    </script>
</body>
</html>
