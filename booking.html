<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Devki Sahu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #FFF0F5, #FFE4E1);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .form-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }
        h1 {
            color: #B43E8F;
            font-size: 48px;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 18px;
            margin-bottom: 40px;
        }
        .info {
            background: #e8f4fd;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 16px;
            text-align: center;
            border-left: 5px solid #B43E8F;
        }
        .form-group {
            margin-bottom: 30px;
        }
        label {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: #B43E8F;
            margin-bottom: 10px;
        }
        input, select, textarea {
            width: 100%;
            padding: 15px 18px;
            font-size: 17px;
            border: 2px solid #FFE4E1;
            border-radius: 12px;
            transition: all 0.3s;
            font-family: inherit;
            background: #fefefe;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #FF6F61;
            box-shadow: 0 0 0 3px rgba(255,111,97,0.2);
            background: white;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #B43E8F, #FF6F61);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(180,62,143,0.3);
        }
        .back-link {
            text-align: center;
            margin-top: 30px;
        }
        .back-link a {
            color: #B43E8F;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
            padding: 12px 25px;
            border: 2px solid #B43E8F;
            border-radius: 30px;
            transition: all 0.3s;
        }
        .back-link a:hover {
            background: #B43E8F;
            color: white;
        }
        .row {
            display: flex;
            gap: 20px;
        }
        .row .form-group {
            flex: 1;
        }
        @media (max-width: 768px) {
            .form-container {
                padding: 30px;
            }
            h1 {
                font-size: 36px;
            }
            .row {
                flex-direction: column;
                gap: 0;
            }
            input, select, textarea {
                padding: 12px 15px;
                font-size: 16px;
            }
            button {
                padding: 15px;
                font-size: 18px;
            }
        }
        @media (max-width: 480px) {
            .form-container {
                padding: 20px;
            }
            h1 {
                font-size: 28px;
            }
            label {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>📚 Book an Appointment</h1>
        <p class="subtitle">Schedule a session with Devki Sahu</p>
        
        <div class="info">
            💡 When you submit, your email app will open with all details filled in.<br>
            Just click SEND to confirm your appointment with Devki Sahu.
        </div>
        
        <form id="appointmentForm">
            <div class="row">
                <div class="form-group">
                    <label>👤 Full Name *</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label>📧 Email Address *</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>📱 Phone Number *</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                </div>
                
                <div class="form-group">
                    <label>👧 Child's Name</label>
                    <input type="text" id="childName" placeholder="Enter child's name (optional)">
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>📅 Select Date *</label>
                    <input type="date" id="date" required>
                </div>
                
                <div class="form-group">
                    <label>⏰ Select Time *</label>
                    <select id="time" required>
                        <option value="">Select a time</option>
                        <option value="9:00 AM">9:00 AM</option>
                        <option value="10:00 AM">10:00 AM</option>
                        <option value="11:00 AM">11:00 AM</option>
                        <option value="12:00 PM">12:00 PM</option>
                        <option value="1:00 PM">1:00 PM</option>
                        <option value="2:00 PM">2:00 PM</option>
                        <option value="3:00 PM">3:00 PM</option>
                        <option value="4:00 PM">4:00 PM</option>
                        <option value="5:00 PM">5:00 PM</option>
                        <option value="6:00 PM">6:00 PM</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>📝 Additional Notes</label>
                <textarea id="notes" placeholder="Any specific topics, questions, or anything you'd like to discuss?"></textarea>
            </div>
            
            <button type="submit">📧 Send Appointment Request</button>
        </form>
        
        <div class="back-link">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script>
        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').min = today;
        
        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get values
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const childName = document.getElementById('childName').value;
            const notes = document.getElementById('notes').value;
            
            // Check required fields
            if (!name || !email || !phone || !date || !time) {
                alert('⚠️ Please fill in all required fields (*)');
                return;
            }
            
            // Format date nicely
            const formattedDate = new Date(date).toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            
            // Create email
            const subject = `Appointment Request from ${name}`;
            
            let body = `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            body += `        NEW APPOINTMENT REQUEST\n`;
            body += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
            body += `👤 Name: ${name}\n`;
            body += `📧 Email: ${email}\n`;
            body += `📱 Phone: ${phone}\n`;
            body += `📅 Date: ${formattedDate}\n`;
            body += `⏰ Time: ${time}\n`;
            if (childName) body += `👧 Child's Name: ${childName}\n`;
            if (notes) body += `\n📝 Notes:\n${notes}\n`;
            body += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            body += `Please confirm this appointment.\n`;
            body += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
            
            // Open email
            window.location.href = `mailto:sahu.devki@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            
            // Show success message
            alert('✅ Your email app will now open!\n\nPlease click SEND to confirm your appointment with Devki Sahu.');
            
            // Reset form
            this.reset();
        });
    </script>
</body>
</html>
