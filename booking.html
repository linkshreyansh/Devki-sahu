<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #FFF0F5, #FFE4E1);
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #B43E8F;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #FF6F61;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        h1 {
            color: #B43E8F;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>📚 Book an Appointment</h1>
        <p>Fill out this form to request an appointment with Devki Sahu.</p>
        
        <div id="successMsg" class="success">✅ Appointment request sent! Check sahu.devki@gmail.com</div>
        <div id="errorMsg" class="error">❌ Error sending. Please try again or email sahu.devki@gmail.com directly.</div>
        
        <form id="contactForm" action="https://formspree.io/f/mgonqdwv" method="POST">
            <input type="text" name="name" placeholder="Your Full Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="date" name="date" required>
            <select name="time" required>
                <option value="">Select Time</option>
                <option>10:00 AM</option>
                <option>11:00 AM</option>
                <option>12:00 PM</option>
                <option>2:00 PM</option>
                <option>3:00 PM</option>
                <option>4:00 PM</option>
            </select>
            <textarea name="notes" rows="3" placeholder="Additional notes..."></textarea>
            <input type="hidden" name="_subject" value="New Appointment Request">
            <button type="submit">Send Appointment Request</button>
        </form>
        <p style="margin-top: 20px;"><a href="index.html">← Back to Home</a></p>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Hide messages
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            
            const formData = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    successMsg.style.display = 'block';
                    form.reset();
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
