<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Devki Sahu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #FFF0F5, #FFE4E1);
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #B43E8F;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background: #FF6F61;
        }
        .info {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        h1 {
            color: #B43E8F;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>📚 Book an Appointment</h1>
        
        <div class="info">
            💡 When you submit, your email app will open with all details filled in.<br>
            Just click SEND to confirm your appointment with Devki Sahu.
        </div>
        
        <form id="appointmentForm">
            <input type="text" id="name" placeholder="Your Full Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <input type="tel" id="phone" placeholder="Phone Number" required>
            <input type="date" id="date" required>
            <select id="time" required>
                <option value="">Select Time</option>
                <option>10:00 AM</option>
                <option>11:00 AM</option>
                <option>12:00 PM</option>
                <option>2:00 PM</option>
                <option>3:00 PM</option>
                <option>4:00 PM</option>
                <option>5:00 PM</option>
            </select>
            <input type="text" id="childName" placeholder="Child's Name (optional)">
            <textarea id="notes" rows="3" placeholder="Additional notes..."></textarea>
            
            <button type="submit">📧 Send Appointment Request</button>
        </form>
        <p style="margin-top: 20px; text-align: center;"><a href="index.html">← Back to Home</a></p>
    </div>

    <script>
        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').min = today;
        
        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get values
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const childName = document.getElementById('childName').value;
            const notes = document.getElementById('notes').value;
            
            // Format date
            const formattedDate = new Date(date).toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric'
            });
            
            // Create email
            const subject = `Appointment Request from ${name}`;
            let body = `NEW APPOINTMENT REQUEST\n\n`;
            body += `Name: ${name}\n`;
            body += `Email: ${email}\n`;
            body += `Phone: ${phone}\n`;
            body += `Date: ${formattedDate}\n`;
            body += `Time: ${time}\n`;
            if (childName) body += `Child's Name: ${childName}\n`;
            if (notes) body += `\nNotes:\n${notes}\n`;
            
            // Open email
            window.location.href = `mailto:sahu.devki@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            
            // Show success message
            alert('✅ Your email app will now open. Please click SEND to confirm your appointment with Devki Sahu!');
        });
    </script>
</body>
</html>
